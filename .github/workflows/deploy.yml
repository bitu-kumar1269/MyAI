name: CI/CD Pipeline — Notes App on EC2

on:
  push:
    branches: [main]

jobs:

  # ══════════════════════════════════════════
  # CI: Build & Push Docker images to Docker Hub
  # ══════════════════════════════════════════
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notes-frontend:latest
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest

  # ══════════════════════════════════════════
  # CD: SSH into EC2 & Deploy with Docker Compose
  # ══════════════════════════════════════════
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Target Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/mern-app

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/mern-app/"

      - name: SSH into EC2 & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mern-app

            # Inject all secrets as environment variables
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}"
            export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
            export CLIPDROP_API_KEY="${{ secrets.CLIPDROP_API_KEY }}"
            export CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}"
            export CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"
            export CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            export VITE_BASE_URL="${{ secrets.VITE_BASE_URL }}"
            export VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}"

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull latest images from Docker Hub
            docker-compose pull

            # Restart containers with latest images
            docker-compose up -d --remove-orphans

            # Clean up old unused images
            docker image prune -f

            echo "✅ Notes App deployed successfully!"