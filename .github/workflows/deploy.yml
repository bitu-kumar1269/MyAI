name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    # 🔹 Build Images
    - name: Build Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/myai-frontend:latest ./frontend
        docker build -t ${{ secrets.DOCKER_USERNAME }}/myai-backend:latest ./backend

    # 🔹 Push Images
    - name: Push Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/myai-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/myai-backend:latest