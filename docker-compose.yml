version: "3.8"

services:
  backend:
    build: ./backend
    container_name: notes-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: notes-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend